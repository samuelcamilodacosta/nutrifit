name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install
      run: npm ci

    - name: Build
      run: npm run build
      env:
        VITE_GROQ_API_KEY: ${{ secrets.NUTRIFIT_GROQ_API_KEY }}

    - name: Test
      run: npm test

    - name: Coverage
      run: npm run test:coverage
